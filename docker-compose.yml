version: "3.9"

services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build: .
    container_name: parking_api
    ports:
      - "8000:8000"
    volumes:
      # mount الـ weights من برا عشان متحتاجش تعيد build لو غيرت الموديل
      - ./weights:/app/weights
    environment:
      - MODEL_PATH=weights/best.pt
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  # ── Streamlit Frontend ───────────────────────────────────────────────────────
  frontend:
    build: .
    container_name: parking_frontend
    ports:
      - "8501:8501"
    environment:
      # الـ frontend يكلم الـ api عن طريق اسم الـ service مش localhost
      - API_URL=http://api:8000
    command: streamlit run src/streamlit_app.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
